<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOCAM Docente - Financiamientos vigentes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="contenedor">
      <h1>FOCAM Docente - Financiamientos vigentes</h1>
      <p>Listado de proyectos de investigación</p>
    </div>
  </header>

  <main class="contenedor">
    <section class="dashboard" id="dashboard">
      <div class="dashboard-card">
        <span class="dashboard-label">Total de proyectos</span>
        <strong id="total-proyectos">0</strong>
      </div>

      <div class="dashboard-card">
        <span class="dashboard-label">Ingeniería</span>
        <strong id="total-ingenieria">0</strong>
      </div>

      <div class="dashboard-card">
        <span class="dashboard-label">Sociales</span>
        <strong id="total-sociales">0</strong>
      </div>

      <div class="dashboard-card">
        <span class="dashboard-label">Vigentes</span>
        <strong id="total-vigentes">0</strong>
      </div>
    </section>

    <section class="filtros">
      <div class="filtro-grupo">
        <label for="buscador">Buscar</label>
        <input
          type="text"
          id="buscador"
          placeholder="Buscar por título, investigador, resolución..."
        />
      </div>

      <div class="filtro-grupo">
        <label for="filtro-anio">Año</label>
        <select id="filtro-anio">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="filtro-instituto">Instituto</label>
        <select id="filtro-instituto">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="filtro-estado">Estado</label>
        <select id="filtro-estado">
          <option value="">Todos</option>
        </select>
      </div>
    </section>

    <section id="cards-container" class="cards-grid"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
